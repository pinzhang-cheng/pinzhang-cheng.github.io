          title: Pinzhang Cheng (Jack)
          subtitle:  "I hold a Master of Mathematics and Statistics from the University of New South Wales and a Bachelor of Economics (Honours Class I) from the University of Sydney.<br><br>I am interested in studying agent behaviour under a set of rules and constraints. In economics, those agents are people: my honours thesis modelled how households with different wealth levels and employment statuses adjust their consumption and saving in response to macroeconomic shocks, which in turn shapes the aggregate dynamics. In optimization, the agent is the solver itself, methodically optimizing an objective function subject to its constraints. My master's thesis studied solver behaviour on a class of NP-hard subset-selection problems, such as portfolio selection and feature selection, formulated as Mixed-Integer Quadratic Programs, and produced an algorithm that increasingly outperforms Gurobi, a leading commercial solver, as the problems become harder to solve."
          #subtitle: "I hold a Master of Mathematics from the University of New South Wales and a Bachelor of Economics (Honours Class I) from the University of Sydney.<br><br>I am interested in analyzing agent behaviour under a set of rules and constraints. In economics, the agents are people. My honours thesis modelled how households at different wealth levels and employment statuses adjust their consumption and saving in response to macroeconomic shocks. In optimization, the agent is the solver itself, methodically optimizing an objective function subject to its constraints. My master's thesis studied solver behaviour on a class of NP-hard subset-selection problems formulated as Mixed-Integer Quadratic Programs, and produced an algorithm that increasingly outperforms Gurobi, a leading commercial solver, as the problems become harder to solve."
          #subtitle: "I'm a recent Master of Mathematics graduate based in Sydney, working at the intersection of convex optimization, probability, and quantitative finance. My thesis developed a novel algorithm for large-scale sparse portfolio selection. Replace this paragraph with two or three sentences in your own voice."
          #subtitle: "I am a Professor in the Institute of Romance Philology at the University of Regensburg, Germany. My research focuses on Portuguese irregular verbs. I was a doctoral student of Professor Dr Dieter Vogelsang in Munich, and later a second assistant of Professor Walter Schoeffler-Henschell at the University of Wiesbaden."
